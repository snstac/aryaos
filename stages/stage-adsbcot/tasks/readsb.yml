- name: Install readsb from the snstac apt repository
  ansible.builtin.apt:
    name: readsb
    state: present
  notify: Restart READSB

- name: Install readsb SDR runtime and build packages (Debian)
  ansible.builtin.apt:
    name:
      - librtlsdr0
      - librtlsdr-dev
      - rtl-sdr
      - libsoapysdr-dev
      - soapysdr-tools
      - soapysdr-module-airspy
      - soapysdr-module-hackrf
      - libhackrf-dev
      - libhackrf0
    state: present
  when: ansible_os_family == "Debian"

- name: Hold readsb (Debian archive ships an SDR-less readsb that must not replace it)
  ansible.builtin.dpkg_selections:
    name: readsb
    selection: hold

- name: Verify readsb SDR backends in binary
  ansible.builtin.shell: |
    set -euo pipefail
    help="$(/usr/bin/readsb --help 2>&1)"
    echo "${help}" | grep -qE 'RTL-SDR|rtlsdr'
    echo "${help}" | grep -qiE 'SoapySDR|soapysdr'
    echo "${help}" | grep -qiE 'HackRF|hackrf'
    /usr/bin/readsb --version >/dev/null
  args:
    executable: /bin/bash
  changed_when: false

- name: Install AryaOS readsb systemd unit and wrapper
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - { src: "{{ shared_files }}/adsbcot/readsb.service", dest: /lib/systemd/system/readsb.service", mode: "0644" }
    - { src: "{{ shared_files }}/adsbcot/run_readsb.sh", dest: /usr/local/sbin/run_readsb.sh", mode: "0755" }
  notify:
    - Reload systemd for adsb decoder
    - Restart READSB

- name: Set readsb RECEIVER_OPTIONS fact
  ansible.builtin.set_fact:
    readsb_receiver_options: "{{ lookup('ansible.builtin.template', 'readsb-receiver-options.j2') | trim }}"

- name: Apply RECEIVER_OPTIONS to /etc/default/readsb
  ansible.builtin.replace:
    path: /etc/default/readsb
    regexp: '^RECEIVER_OPTIONS=.*'
    replace: "{{ readsb_receiver_options }}"
  notify: Restart READSB

- name: Set ADSB_JSON directory in /etc/default/readsb
  ansible.builtin.lineinfile:
    path: /etc/default/readsb
    regexp: '^ADSB_JSON='
    line: "ADSB_JSON={{ aryaos_adsb_json_dir }}"
  notify: Restart READSB
