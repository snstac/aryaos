- name: Install cockpit-adsbcot Debian package
  ansible.builtin.apt:
    name: cockpit-adsbcot
    state: present
  notify: Restart Cockpit

- name: Verify cockpit-adsbcot Cockpit manifest exists
  ansible.builtin.stat:
    path: /usr/share/cockpit/adsbcot/manifest.json
  register: cockpit_adsbcot_manifest

- name: Assert cockpit-adsbcot UI files installed
  ansible.builtin.assert:
    that:
      - cockpit_adsbcot_manifest.stat.exists
    fail_msg: >-
      cockpit-adsbcot manifest missing under /usr/share/cockpit/adsbcot/;
      check the snstac apt repo install (stage-pytak configures the repo).
