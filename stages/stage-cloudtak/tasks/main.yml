- name: CloudTAK shim install directory
  ansible.builtin.file:
    path: /opt/cloudtak
    state: directory
    mode: "0755"

- name: Install CloudTAK shim compose + README
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/opt/cloudtak/{{ item | basename }}"
    mode: "0644"
  loop:
    - "{{ shared_files }}/cloudtak/docker-compose.yml"
    - "{{ shared_files }}/cloudtak/README.md"

- name: Install CloudTAK shim image build context
  ansible.builtin.copy:
    src: "{{ shared_files }}/cloudtak/shim/"
    dest: /opt/cloudtak/shim/
    owner: root
    group: root

- name: Install CloudTAK shim systemd unit
  ansible.builtin.copy:
    src: "{{ shared_files }}/cloudtak/cloudtak-shim.service"
    dest: /etc/systemd/system/cloudtak-shim.service
    mode: "0644"

- name: Reload systemd (CloudTAK shim unit)
  ansible.builtin.systemd:
    daemon_reload: true

- name: Enable CloudTAK shim service
  ansible.builtin.systemd:
    name: cloudtak-shim.service
    enabled: true
