- name: Copy sudoers
  ansible.builtin.copy:
    src: "{{ shared_files }}/aryaos/aryaos.sudoers"
    dest: /etc/sudoers.d/aryaos
    mode: "0440"

# Create the directory /etc/aryaos/
- name: Create AryaOS Directory
  ansible.builtin.file:
    path: /etc/aryaos
    state: directory
    mode: "0755"

# Copy the AryaOS config file to /etc/aryaos/
- name: Upload AryaOS Config
  ansible.builtin.copy:
    src: "{{ shared_files }}/aryaos/aryaos-config.txt"
    dest: /etc/aryaos/
    mode: "0644"

# Copy README-aryaos.txt to /
- name: Upload AryaOS README
  ansible.builtin.copy:
    src: "{{ shared_files }}/aryaos/README-aryaos.txt"
    dest: /
    mode: "0644"

# Copy the AryaOS banner files to /etc
- name: Upload AryaOS Banner
  ansible.builtin.copy:
    src: "{{ shared_files }}/aryaos/{{ item }}"
    dest: /etc/
    mode: "0644"
  loop: "{{ ['issue.net', 'issue', 'motd', 'aryaos-version', 'aryaos-release'] }}"


# Copy get_throttled.sh" to /usr/local/sbin/
- name: Upload get_throttled.sh
  ansible.builtin.copy:
    src: "{{ shared_files }}/aryaos/get_throttled.sh"
    dest: /usr/local/sbin/
    mode: "0755"

- name: Upload TAK data package importer
  ansible.builtin.copy:
    src: "{{ shared_files }}/aryaos/aryaos-import-tak-dp"
    dest: /usr/local/sbin/aryaos-import-tak-dp
    mode: "0755"

- name: Upload TAK data package import daemon
  ansible.builtin.copy:
    src: "{{ shared_files }}/aryaos/aryaos-tak-dp-importd"
    dest: /usr/local/sbin/aryaos-tak-dp-importd
    mode: "0755"

- name: Upload GPS time sync helper
  ansible.builtin.copy:
    src: "{{ shared_files }}/aryaos/aryaos-gps-time-sync"
    dest: /usr/local/sbin/aryaos-gps-time-sync
    mode: "0755"

- name: Install TAK data package import daemon unit
  ansible.builtin.copy:
    src: "{{ shared_files }}/aryaos/systemd/aryaos-tak-dp-importd.service"
    dest: /etc/systemd/system/aryaos-tak-dp-importd.service
    mode: "0644"
  notify: Reload systemd

- name: Install GPS time sync unit
  ansible.builtin.copy:
    src: "{{ shared_files }}/aryaos/systemd/aryaos-gps-time-sync.service"
    dest: /etc/systemd/system/aryaos-gps-time-sync.service
    mode: "0644"
  notify: Reload systemd

- name: Enable and start TAK data package import daemon
  ansible.builtin.systemd:
    name: aryaos-tak-dp-importd.service
    enabled: true
    state: started
    daemon_reload: true

- name: Ensure gpsd system group (socket group for gpspipe / portal CGI)
  ansible.builtin.group:
    name: gpsd
    system: true
    state: present

- name: Install gpsd.socket drop-in (0660 root:gpsd; default unit is 0600 root-only)
  ansible.builtin.copy:
    src: "{{ shared_files }}/aryaos/systemd/gpsd.socket.d/socket-group.conf"
    dest: /etc/systemd/system/gpsd.socket.d/socket-group.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart gpsd

- name: Install AryaOS gpsd defaults (USB ttyUSB + ttyACM, USBAUTO, -n)
  ansible.builtin.copy:
    src: "{{ shared_files }}/aryaos/gpsd.default"
    dest: /etc/default/gpsd
    owner: root
    group: root
    mode: "0644"
    backup: true
    force: "{{ aryaos_force_gpsd_default | default(false) | bool }}"
  notify: Restart gpsd

- name: Ensure www-data can use gpspipe (gpsd socket group)
  ansible.builtin.user:
    name: www-data
    groups: gpsd
    append: true
  notify: Restart lighttpd

- name: Ensure www-data can run vcgencmd (Raspberry Pi video group)
  ansible.builtin.user:
    name: www-data
    groups: video
    append: true
  notify: Restart lighttpd

- name: Ensure lincot can read Raspberry Pi throttle state
  ansible.builtin.user:
    name: lincot
    groups: video
    append: true
  notify: Restart lincot

- name: Enable gpsd at boot
  ansible.builtin.systemd:
    name: gpsd.service
    enabled: true
    daemon_reload: true

- name: Enable GPS time sync at boot
  ansible.builtin.systemd:
    name: aryaos-gps-time-sync.service
    enabled: true
    daemon_reload: true
