# code: language=ansible

- name: Restart lighttpd
  ansible.builtin.service:
    name: lighttpd
    state: restarted

- name: Restart gpsd
  block:
    - name: Reload systemd (gpsd.socket drop-in, etc.)
      ansible.builtin.systemd:
        daemon_reload: true
    - name: Stop gpsd before recreating control socket
      ansible.builtin.service:
        name: gpsd
        state: stopped
    - name: Recreate /run/gpsd.sock with SocketMode/SocketGroup from drop-in
      ansible.builtin.service:
        name: gpsd.socket
        state: restarted
    - name: Start gpsd again
      ansible.builtin.service:
        name: gpsd
        state: started

- name: Reload systemd and restart lighttpd
  ansible.builtin.systemd:
    name: lighttpd
    daemon_reload: true
    state: restarted

- name: Restart tar1090
  ansible.builtin.service:
    name: tar1090
    state: restarted

- name: Restart dump1090-fa
  ansible.builtin.service:
    name: dump1090-fa
    state: restarted

- name: Restart dump978-fa
  ansible.builtin.service:
    name: dump978-fa
    state: restarted