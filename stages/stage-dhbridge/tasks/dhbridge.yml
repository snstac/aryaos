# SPDX-License-Identifier: Apache-2.0
# Copyright Sensors & Signals LLC https://www.snstac.com/

- name: Install dhbridge configuration
  ansible.builtin.copy:
    src: "{{ shared_files }}/dhbridge/dhbridge.ini"
    dest: /etc/dhbridge.ini
    mode: "0644"
  notify: Restart dhbridge

- name: Install AryaOS Bluetooth readiness helper
  ansible.builtin.copy:
    src: "{{ shared_files }}/dhbridge/aryaos-bt-ready.sh"
    dest: /usr/local/sbin/aryaos-bt-ready.sh
    mode: "0755"
  notify:
    - Reload systemd
    - Restart dhbridge

- name: Install AryaOS dhbridge start wrapper
  ansible.builtin.copy:
    src: "{{ shared_files }}/dhbridge/aryaos-dhbridge-start.sh"
    dest: /usr/local/sbin/aryaos-dhbridge-start.sh
    mode: "0755"
  notify:
    - Reload systemd
    - Restart dhbridge

- name: Install AryaOS Bluetooth readiness service
  ansible.builtin.copy:
    src: "{{ shared_files }}/dhbridge/systemd/system/aryaos-bt-ready.service"
    dest: /etc/systemd/system/aryaos-bt-ready.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart dhbridge

- name: Ensure dhbridge.service.d exists
  ansible.builtin.file:
    path: /etc/systemd/system/dhbridge.service.d
    state: directory
    mode: "0755"

- name: dhbridge reads aryaos-config EnvironmentFile
  ansible.builtin.copy:
    src: "{{ shared_files }}/dhbridge/systemd/dhbridge.service.d/aryaos-config.conf"
    dest: /etc/systemd/system/dhbridge.service.d/aryaos-config.conf
    mode: "0644"
  notify:
    - Reload systemd
    - Restart dhbridge

- name: dhbridge waits for AryaOS Bluetooth readiness
  ansible.builtin.copy:
    src: "{{ shared_files }}/dhbridge/systemd/dhbridge.service.d/aryaos-bt-ready.conf"
    dest: /etc/systemd/system/dhbridge.service.d/aryaos-bt-ready.conf
    mode: "0644"
  notify:
    - Reload systemd
    - Restart dhbridge

- name: dhbridge uses hostname as Bluetooth broadcast ID
  ansible.builtin.copy:
    src: "{{ shared_files }}/dhbridge/systemd/dhbridge.service.d/aryaos-hostname-broadcast.conf"
    dest: /etc/systemd/system/dhbridge.service.d/aryaos-hostname-broadcast.conf
    mode: "0644"
  notify:
    - Reload systemd
    - Restart dhbridge

- name: Enable AryaOS Bluetooth readiness service
  ansible.builtin.systemd:
    name: aryaos-bt-ready.service
    enabled: true
    daemon_reload: true

- name: Enable and start dhbridge
  ansible.builtin.systemd:
    name: dhbridge.service
    enabled: true
    state: started
    daemon_reload: true
