- name: Install AryaOS LINCOT defaults
  ansible.builtin.template:
    src: lincot.default.j2
    dest: /etc/default/lincot
    mode: "0644"
  notify: Restart Lincot

- name: Enable and start LINCOT
  ansible.builtin.systemd:
    name: lincot.service
    enabled: true
    state: started
    daemon_reload: true
