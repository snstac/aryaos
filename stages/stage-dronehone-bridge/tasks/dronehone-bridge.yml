- name: Install dronehone-bridge configuration
  ansible.builtin.copy:
    src: "{{ shared_files }}/dronehone-bridge/dronehone-bridge.ini"
    dest: /etc/dronehone-bridge.ini
    mode: "0644"
  notify: Restart dronehone-bridge

- name: Ensure dronehone-bridge.service.d exists
  ansible.builtin.file:
    path: /etc/systemd/system/dronehone-bridge.service.d
    state: directory
    mode: "0755"

- name: dronehone-bridge reads aryaos-config EnvironmentFile
  ansible.builtin.copy:
    src: "{{ shared_files }}/dronehone-bridge/systemd/dronehone-bridge.service.d/aryaos-config.conf"
    dest: /etc/systemd/system/dronehone-bridge.service.d/aryaos-config.conf
    mode: "0644"
  notify:
    - Reload systemd
    - Restart dronehone-bridge

- name: Enable and start dronehone-bridge
  ansible.builtin.systemd:
    name: dronehone-bridge.service
    enabled: true
    state: started
    daemon_reload: true
