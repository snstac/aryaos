# code: language=ansible
# Install the snstac sensor stack from the signed snstac apt repository
# (https://snstac.github.io/packages); package list in
# manifests/aryaos-sensor-packages.yml. dhbridge stays vendored (private upstream).
#
# Copyright Sensors & Signals LLC https://www.snstac.com
#
# Licensed under the Apache License, Version 2.0 (the "License");
# you may not use this file except in compliance with the License.
# You may obtain a copy of the License at
#
# http://www.apache.org/licenses/LICENSE-2.0

- name: Load sensor stack package manifest
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/manifests/aryaos-sensor-packages.yml"

- name: Install snstac apt repository keyring
  ansible.builtin.copy:
    src: "{{ shared_files }}/aryaos/snstac-packages/snstac.gpg"
    dest: /usr/share/keyrings/snstac.gpg
    mode: "0644"
  when: ansible_os_family == "Debian"

- name: Install snstac apt repository sources
  ansible.builtin.copy:
    src: "{{ shared_files }}/aryaos/snstac-packages/snstac.sources"
    dest: /etc/apt/sources.list.d/snstac.sources
    mode: "0644"
  when: ansible_os_family == "Debian"

- name: Install sensor stack from snstac apt repository
  ansible.builtin.apt:
    name: "{{ sensor_apt_packages }}"
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"

- name: Copy vendored dhbridge package (private upstream)
  ansible.builtin.copy:
    src: "{{ shared_files }}/dhbridge/{{ dhbridge_deb }}"
    dest: "/usr/src/{{ dhbridge_deb }}"
    mode: "0644"
  when: ansible_os_family == "Debian"

- name: Install vendored dhbridge package
  ansible.builtin.apt:
    deb: "/usr/src/{{ dhbridge_deb }}"
  when: ansible_os_family == "Debian"
