# you may not use this file except in compliance with the License.
# You may obtain a copy of the License at
#
# http://www.apache.org/licenses/LICENSE-2.0

- name: Load sensor stack package manifest
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/manifests/aryaos-sensor-packages.yml"

- name: Install snstac apt repository keyring
  ansible.builtin.copy:
    src: "{{ shared_files }}/aryaos/snstac-packages/snstac.gpg"
    dest: /usr/share/keyrings/snstac.gpg
    mode: "0644"
  when: ansible_os_family == "Debian"

- name: Install snstac apt repository sources
  ansible.builtin.copy:
    src: "{{ shared_files }}/aryaos/snstac-packages/snstac.sources"
    dest: /etc/apt/sources.list.d/snstac.sources
    mode: "0644"
  when: ansible_os_family == "Debian"

- name: Install sensor stack from snstac apt repository
  ansible.builtin.apt:
    name: "{{ sensor_apt_packages }}"
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"

- name: Upload cockpit-aryaos data package UI patch
  ansible.builtin.copy:
    src: "{{ shared_files }}/aryaos/patch-cockpit-aryaos-dp"
    dest: /usr/local/sbin/patch-cockpit-aryaos-dp
    mode: "0755"

- name: Patch cockpit-aryaos data package UI
  ansible.builtin.command: /usr/local/sbin/patch-cockpit-aryaos-dp
  register: cockpit_aryaos_dp_patch
  changed_when: "'patched cockpit-aryaos' in cockpit_aryaos_dp_patch.stdout"
