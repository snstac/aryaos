- name: Load sensor stack package manifest
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/manifests/aryaos-sensor-packages.yml"

- name: Ensure cache for apt on Debian family
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when: ansible_os_family == "Debian"

- name: Download sensor stack .debs
  ansible.builtin.get_url:
    url: "{{ item }}"
    dest: "/usr/src/{{ item | basename }}"
    mode: "0644"
  loop: "{{ sensor_deb_urls }}"
  when: ansible_os_family == "Debian"

- name: Install sensor stack .debs
  ansible.builtin.apt:
    deb: "/usr/src/{{ item | basename }}"
  loop: "{{ sensor_deb_urls }}"
  when: ansible_os_family == "Debian"

- name: Copy vendored dhbridge package (private upstream)
  ansible.builtin.copy:
    src: "{{ shared_files }}/dhbridge/{{ dhbridge_deb }}"
    dest: "/usr/src/{{ dhbridge_deb }}"
    mode: "0644"
  when: ansible_os_family == "Debian"

- name: Install vendored dhbridge package
  ansible.builtin.apt:
    deb: "/usr/src/{{ dhbridge_deb }}"
  when: ansible_os_family == "Debian"
