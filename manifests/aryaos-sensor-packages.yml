---
# Single source of truth for the snstac sensor stack (image build + Ansible).
# Installed from the signed snstac apt repository — https://snstac.github.io/packages
# (built by snstac/packages from each product's latest GitHub Release, refreshed daily).
# Trust anchor vendored at shared_files/aryaos/snstac-packages/ (snstac.gpg + snstac.sources).
sensor_apt_packages:
  - pytak
  - takproto
  - python3-asyncinotify
  - aircot
  - charontak
  - gpstak
  - adsbcot
  - aiscot
  - cockpit-aiscot
  - dronecot
  - lincot
  # cockpit-gps — live GNSS data from gpsd with spoof/jam integrity monitoring.
  - cockpit-gps
  # Cockpit is the AryaOS admin surface: every installed gateway ships its plugin.
  - cockpit-lincot
  - cockpit-aiscatcher
  - cockpit-dronecot
  - cockpit-charontak
  - cockpit-gpstak
  # cockpit-aryaos — the "AryaOS Site" page: site-wide COT_URL + TAK TLS certs.
  - cockpit-aryaos
  # dhbridge — DroneHone Bluetooth sensor bridge (public since v0.3.2).
  - dhbridge
# cockpit-adsbcot is installed by stage-adsbcot (same apt repo).
