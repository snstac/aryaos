# CloudTAK-SA shim + web UI for AryaOS (/cloudtak/ via lighttpd).
# SPDX-License-Identifier: Apache-2.0

services:
  shim:
    environment:
      SA_SHIM_LOGIN_USER: cloudtak
      SA_SHIM_LOGIN_PASSWORD: cloudtak415
      SA_SHIM_BASIC_USER: cloudtak
      SA_SHIM_BASIC_PASSWORD: cloudtak415
    build:
      context: ./shim
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "0.0.0.0:8080:8080"
      - "0.0.0.0:8089:8089"
      - "0.0.0.0:8443:8443"
      - "127.0.0.1:18443:18443"
    volumes:
      - ./shim/certs:/app/certs

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      network: host
    restart: unless-stopped
    ports:
      # CloudTAK web UI: http://<host>:5000/cloudtak/ (LAN; lighttpd on :443 also proxies here)
      - "0.0.0.0:5000:80"
    depends_on:
      - shim
