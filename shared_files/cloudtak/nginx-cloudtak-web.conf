# CloudTAK web UI (SPA) — two access patterns:
# 1) lighttpd reverse-proxy strips /cloudtak → nginx sees /, /assets/… (location /)
# 2) Direct HTTP on host :5000 → browser uses /cloudtak/… (Vite base); rewrite to files under root
#
# SPA REST calls (/api/*) proxy to shim Marti HTTP (docker service "shim" :18443).
#
# SPDX-License-Identifier: Apache-2.0

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /cloudtak/api/ {
        proxy_pass http://shim:18443/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/ {
        proxy_pass http://shim:18443/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- Direct access: http://<host>:5000/cloudtak/ (not via lighttpd) ---
    location = / {
        return 302 /cloudtak/;
    }
    location = /cloudtak {
        return 301 /cloudtak/;
    }
    location /cloudtak/ {
        rewrite ^/cloudtak/(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;
    }

    # --- Proxied access: paths already without /cloudtak prefix ---
    location / {
        try_files $uri $uri/ /index.html;
    }
}
