[dhbridge]
DEBUG = false
COT_ENABLED = true
COT_LISTEN_HOST = 0.0.0.0
COT_LISTEN_PORT = 8087
MQTT_ENABLED = false
MQTT_BROKER = localhost
MQTT_PORT = 1883
MQTT_TOPIC = #
RFCOMM_ENABLED = true
BLE_ENABLED = false
BT_ADAPTER = hci0
BT_NAME = AryaOS RemoteID
RFCOMM_CHANNEL = 1
EMIT_INTERVAL_SEC = 2.0
UAS_STALE_SEC = 30.0
DEVICE_VERSION = 1.0.0
DEVICE_MANUFACTURER = Sensors & Signals LLC
DEVICE_MAKE = AryaOS
