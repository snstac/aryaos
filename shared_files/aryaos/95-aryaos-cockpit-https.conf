# AryaOS: HTTPS portal at / (document root); Cockpit only under /admin (proxied from localhost:9090).
# HTTP (:80) serves a small heads-up page that links users to HTTPS.
#
# Static/apps under /skyaware, /recorder, /tar1090 stay on lighttpd via other snippets.
# Requires Debian lighttpd snippets: 10-openssl.conf, 10-proxy.conf, 10-redirect.conf, 10-cgi.conf,
# optional 10-deflate.conf (mod_deflate — gzip for text/css, text/html, application/javascript, etc.),
# and mod_setenv (see cockpit-proxy Ansible tasks).
#
# TLS uses ssl-cert snakeoil; replace with a real cert after provisioning if desired.
#
# SPDX-License-Identifier: Apache-2.0
# Copyright Sensors & Signals LLC https://www.snstac.com/

## --- HTTP: cleartext heads-up only. Real portal/admin live on HTTPS. ---
$SERVER["socket"] == ":80" {
    server.document-root = "/var/www/html/http"
    index-file.names = ( "index.html" )
    server.error-handler-404 = "/index.html"

    ## Users who type the known Cockpit path on cleartext HTTP should land on
    ## Cockpit directly, not the generic HTTPS heads-up page.
    $HTTP["host"] =~ ".*" {
        url.redirect-code = 308
        url.redirect = (
            "^/admin$" => "https://%0/admin/",
            "^/admin/(.*)$" => "https://%0/admin/$1"
        )
    }
}

## --- HTTPS: TLS; proxy only /admin* to Cockpit (UrlRoot=/admin). Everything else uses server.document-root.
$SERVER["socket"] == ":443" {
    ssl.engine = "enable"
    ssl.pemfile = "/etc/lighttpd/ssl/snakeoil-combined.pem"

    ## Portal machine JSON / upload endpoints only — do not expose the full distro cgi-bin tree.
    ## Requires conf-enabled/10-cgi.conf.
    alias.url += ( "/cgi-bin/aryaos-portal-status" => "/usr/lib/cgi-bin/aryaos-portal-status" )
    $HTTP["url"] =~ "^/cgi-bin/aryaos-portal-status$" {
        cgi.assign = ( "" => "" )
    }
    alias.url += ( "/cgi-bin/aryaos-tak-dp-upload" => "/usr/lib/cgi-bin/aryaos-tak-dp-upload" )
    $HTTP["url"] =~ "^/cgi-bin/aryaos-tak-dp-upload$" {
        cgi.assign = ( "" => "" )
    }

    ## Baseline security headers for non-admin portal content (JSON sets its own too).
    $HTTP["url"] !~ "^/admin/" {
        setenv.add-response-header = (
            "X-Frame-Options" => "SAMEORIGIN",
            "Referrer-Policy" => "strict-origin-when-cross-origin"
        )
    }

    ## Cockpit UrlRoot=/admin requires a trailing slash; bare /admin breaks the backend.
    $HTTP["url"] == "/admin" {
        url.redirect-code = 308
        url.redirect = ( "^/admin$" => "/admin/" )
    }

    $HTTP["url"] =~ "^/admin/" {
        setenv.add-request-header = ("X-Forwarded-Proto" => "https")
        ## lighttpd 1.4.76+: proxy.header upgrade must be "enable" or "disable" (not raw headers).
        proxy.header = ( "upgrade" => "enable" )
        proxy.server = ( "" => ( (
            "host" => "127.0.0.1",
            "port" => 9090
        ) ) )
    }
}
