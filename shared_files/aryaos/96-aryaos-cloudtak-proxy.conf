# AryaOS: CloudTAK web UI and Marti API under /cloudtak/ (HTTPS :443).
#
# - Marti shim HTTP on 127.0.0.1:18443 (compose publishes host port)
# - CloudTAK web static UI on 127.0.0.1:5000 (docker compose service "web")
#
# Marti paths must not fall through to the web proxy (lighttpd may apply all
# matching url conditions; use explicit paths and nested exclusion).
#
# SPDX-License-Identifier: Apache-2.0
# Copyright Sensors & Signals LLC https://www.snstac.com/

$SERVER["socket"] == ":443" {
    $HTTP["url"] == "/cloudtak" {
        url.redirect-code = 308
        url.redirect = ( "^/cloudtak$" => "/cloudtak/" )
    }

    $HTTP["url"] =~ "^/cloudtak/Marti" {
        setenv.add-request-header = ("X-Forwarded-Proto" => "https")
        proxy.header = ( "map-urlpath" => ( "/cloudtak" => "" ) )
        proxy.server = ( "" => ( (
            "host" => "127.0.0.1",
            "port" => 18443
        ) ) )
    }

    $HTTP["url"] =~ "^/cloudtak/files" {
        setenv.add-request-header = ("X-Forwarded-Proto" => "https")
        proxy.header = ( "map-urlpath" => ( "/cloudtak" => "" ) )
        proxy.server = ( "" => ( (
            "host" => "127.0.0.1",
            "port" => 18443
        ) ) )
    }

    $HTTP["url"] =~ "^/cloudtak/" {
        $HTTP["url"] !~ "^/cloudtak/Marti" {
            $HTTP["url"] !~ "^/cloudtak/files" {
                setenv.add-request-header = ("X-Forwarded-Proto" => "https")
                proxy.header = ( "map-urlpath" => ( "/cloudtak" => "" ), "upgrade" => "enable" )
                proxy.server = ( "" => ( (
                    "host" => "127.0.0.1",
                    "port" => 5000
                ) ) )
            }
        }
    }
}
