# AryaOS kernel/network hardening (/etc/sysctl.d/90-aryaos-hardening.conf).
#
# Conservative set chosen for a multi-homed field sensor appliance:
# - rp_filter=2 (loose) not 1 (strict): units are multi-homed (eth/wlan/pan0/
#   tailscale/AntSDR link) and receive Mesh SA multicast; strict RPF drops
#   legitimate asymmetric traffic.
# - No accept_ra changes: units may rely on IPv6 RA on managed networks.
#
# Copyright Sensors & Signals LLC https://www.snstac.com/
# SPDX-License-Identifier: Apache-2.0

# ICMP redirects: never accept or send (MITM vector on shared LANs).
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Source-routed packets: drop.
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0

# Loose reverse-path filtering (see header for why not strict).
net.ipv4.conf.all.rp_filter = 2
net.ipv4.conf.default.rp_filter = 2

# SYN flood resistance.
net.ipv4.tcp_syncookies = 1

# Kernel info-leak reduction.
kernel.kptr_restrict = 1
kernel.dmesg_restrict = 1

# Unprivileged eBPF off (nothing on AryaOS uses it unprivileged).
kernel.unprivileged_bpf_disabled = 1
net.core.bpf_jit_harden = 2

# FIFO/regular-file spoofing protection in sticky world-writable dirs.
fs.protected_fifos = 1
fs.protected_regular = 2
