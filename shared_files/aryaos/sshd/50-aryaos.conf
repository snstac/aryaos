# AryaOS sshd hardening drop-in (/etc/ssh/sshd_config.d/50-aryaos.conf).
#
# Password authentication stays ENABLED: field units ship with a published
# default password that is force-expired at first login (aryaos-firstboot.sh),
# and operators may not have key material in the field. Everything else is
# tightened.
#
# Copyright Sensors & Signals LLC https://www.snstac.com/
# SPDX-License-Identifier: Apache-2.0

PermitRootLogin no
PermitEmptyPasswords no
MaxAuthTries 4
LoginGraceTime 30
X11Forwarding no
AllowTcpForwarding yes
Banner /etc/issue.net
