<!DOCTYPE html>

<html lang="en">

  <head>
    <title>CloudTAK — AryaOS</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../css/uikit.min.css"/>
    <link href="../css/styles.css" rel="stylesheet">
  </head>

  <body>
    <div>
      <h1 class="uk-heading-medium uk-heading-line"><span>CloudTAK</span></h1>
      <p class="uk-margin">CloudTAK shim (Marti / WebTAK API) on this AryaOS device.</p>
    </div>

    <div class="uk-margin">
      <p>
        <a id="marti-link" class="uk-button uk-button-primary uk-button-large" href="#">Open Marti API (HTTPS)</a>
        <a class="uk-button uk-button-default uk-margin-small-left" href="/">Back to portal</a>
      </p>
      <p class="uk-text-meta uk-margin-small-top">
        The Marti API listens on port <strong>8443</strong> with a shim-generated certificate.
        Your browser may warn about the certificate until you trust it or accept the exception.
      </p>
    </motion>

    <script>
      (function () {
        var host = window.location.hostname || 'localhost';
        var url = 'https://' + host + ':8443/';
        var link = document.getElementById('marti-link');
        link.href = url;
        link.textContent = 'Open Marti API — ' + url;
      })();
    </script>
    <script src="../js/uikit.min.js"></script>
    <script src="../js/uikit-icons.min.js"></script>
  </body>
</html>
