# AryaOS zram swap — compressed RAM swap instead of a swapfile on the install
# media. AryaOS disables dphys-swapfile to spare the SD/NVMe from swap writes;
# this restores a swap device that lives in RAM (zstd-compressed), so the box
# tolerates memory spikes (multi-SDR + Node-RED + containers) without OOM kills
# and without writing to disk. Overrides the stock /usr/lib zram-generator.conf.
#
# Copyright Sensors & Signals LLC https://www.snstac.com/
# SPDX-License-Identifier: Apache-2.0
[zram0]
zram-size = min(ram / 2, 4096)
compression-algorithm = zstd
swap-priority = 100
