# AryaOS Cockpit — reverse-proxy behind lighttpd (HTTPS on :443).
#
# cockpit-ws listens on loopback only (see systemd drop-in). lighttpd terminates
# TLS and proxies with X-Forwarded-* headers.
#
# SPDX-License-Identifier: Apache-2.0
# Copyright Sensors & Signals LLC https://www.snstac.com/

[WebService]
AllowUnencrypted = true
ProtocolHeader = X-Forwarded-Proto
ForwardedForHeader = X-Forwarded-For
