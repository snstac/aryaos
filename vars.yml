---
shared_files: "{{ inventory_dir }}/shared_files"

# rpi: full AryaOS appliance (portal, comitup, etc.). generic: sensor stack on existing hosts (e.g. DragonOS).
aryaos_profile: rpi

# Optional. When set, installs this key for user "ansible" (stage-base).
# aryaos_ansible_authorized_key: "ssh-ed25519 AAAA..."

adsb_sdr_sn: stx:1090:0
# UAT / 978 MHz RTL-SDR EEPROM serial (dump978-fa). Default matches Nooelec NESDR Nano 3 “978”.
# Keep in sync with ARYAOS_UAT_RTL_SERIAL in shared_files/aryaos/aryaos-config.txt unless you override only at image build.
uat_sdr_sn: stx:978:0

# readsb SDR: rtlsdr (RTL EEPROM serial in adsb_sdr_sn) or soapysdr (Airspy, etc. via readsb_soapy_device).
readsb_device_type: rtlsdr
readsb_soapy_device: driver=airspy
readsb_gain: -10
readsb_ppm: 0

# 1090 MHz ADS-B decoder: readsb OR dump1090_fa (mutually exclusive).
aryaos_adsb_decoder: readsb
# Unified JSON feed for readsb, dump1090-fa, and adsbcot (see ARYAOS_ADSB_JSON_DIR in aryaos-config.txt).
aryaos_adsb_json_dir: /run/adsb
aryaos_adsb_feed_url: "file:///run/adsb/aircraft.json"

# Sensor stack (pytak, charontak, lincot, *cot, cockpit-*) installs from the signed
# snstac apt repository — see manifests/aryaos-sensor-packages.yml.
charontak_ingress_cot_url: udp+ro://127.0.0.1:28087
charontak_egress_cot_url: udp+wo://239.2.3.1:6969
charontak_feeder_cot_url: udp+wo://127.0.0.1:28087

# DroneHone Bluetooth sensor bridge — installed from the snstac apt repo
# (manifests/aryaos-sensor-packages.yml).
dhbridge_mqtt_broker: localhost
dhbridge_mqtt_port: 1883
dhbridge_mqtt_topic: "#"
dhbridge_bt_adapter: hci0
dhbridge_bt_name: "AryaOS RemoteID"
dhbridge_rfcomm_enabled: true
dhbridge_ble_enabled: false

lincot_gps_info_cmd: gpspipe --json -n 5
lincot_poll_interval: 61
lincot_cot_type: a-f-G-E-S
lincot_cockpit_url: https://127.0.0.1/admin/
lincot_ssh_user: pi

takserver_rpm: takserver-5.2-RELEASE43.noarch.rpm
takserver_gpg_key: takserver-public-gpg.key
pgsql_repo_rpm: pgdg-redhat-repo-latest.noarch.rpm

takserver_users: ["admin", "enroll"]

