# Pi-gen image build on GitHub-hosted arm64 (native aarch64; no QEMU/binfmt overhead).
#
# Flow: push to main or workflow_dispatch → build → upload Actions artifact →
# create annotated tag v<UTC-datetime>-<12-char-sha> → GitHub Release with image file.

name: Pi-gen image

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release:
        description: "Release build: disable dev mode (no lab SSH key/sudo, first-boot password expiry enforced)"
        type: boolean
        default: false
      release_tag:
        description: "Optional release tag override for workflow_dispatch release builds, e.g. v2.0.0-beta"
        type: string
        default: ""

# Per-ref group: main image builds serialize against each other, but PR validate
# jobs don't queue behind (or get cancelled by) multi-hour main builds.
concurrency:
  group: aryaos-pi-gen-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install "ansible-core>=2.14" ansible

      - name: Install collections and syntax-check playbook
        run: |
          ansible-galaxy collection install -r requirements.yml
          ansible-playbook -i localhost, -c local site.yml --syntax-check

      - name: Shellcheck appliance scripts
        # Lint the shell that ships to /usr/local/sbin and the build/test
        # tooling. Error severity only: legacy scripts carry style warnings.
        run: |
          set -euo pipefail
          shellcheck -S error \
            shared_files/aryaos/*.sh \
            shared_files/aryaos/aryaos-update \
            shared_files/aryaos/aryaos-support-bundle \
            shared_files/aryaos/aryaos-set-nodered-password \
            shared_files/aryaos/aryaos-sdr \
            shared_files/aryaos/aryaos-role \
            scripts/*.sh \
            scripts/aryaos-test/run.sh \
            scripts/aryaos-test/lib.sh \
            scripts/aryaos-test/tests/*.sh \
            stages/*/00-install/*.sh

      - name: Verify image build inputs exist
        run: |
          test -f manifests/aryaos-sensor-packages.yml
          test -d stages/stage-patch
          test -f stages/stage-pytak/00-install/01-run-chroot.sh
          test -f shared_files/aryaos/snstac-packages/snstac.gpg
          test -f shared_files/aryaos/snstac-packages/snstac.sources
          test -f shared_files/aryaos/aryaos-lab.sudoers
          test -f config

      - name: Verify image export point
        # stage-patch strips stage2's EXPORT_IMAGE, so exactly one custom stage must
        # carry it and be last in every STAGE_LIST — otherwise no image is exported.
        run: |
          set -euo pipefail
          mapfile -t exports < <(ls stages/*/EXPORT_IMAGE)
          if [ "${#exports[@]}" -ne 1 ]; then
            echo "Expected exactly one stages/*/EXPORT_IMAGE, found: ${exports[*]:-none}" >&2
            exit 1
          fi
          export_stage="$(basename "$(dirname "${exports[0]}")")"
          echo "Export stage: ${export_stage}"
          for cfg in config config.docker .github/workflows/pi-gen.yml; do
            last="$(grep -E "^[[:space:]]*(stage-list:|STAGE_LIST=)" "$cfg" | head -n1 | awk '{print $NF}' | tr -d '"')"
            if [[ "$(basename "$last")" != "$export_stage" ]]; then
              echo "${cfg}: STAGE_LIST does not end with ${export_stage} (ends with ${last})" >&2
              exit 1
            fi
          done

      - name: Verify pinned download URLs are reachable
        # Catches upstream release renames before they break a 6-hour main build
        # (e.g. node-red/linux-installers v2.0.0 renamed the deb installer asset).
        run: |
          set -euo pipefail
          url="$(grep -Eo "https://github.com/node-red/linux-installers/[^']+" stages/stage-node-red/00-install/00-run.sh)"
          curl -fsSIL --max-time 30 -o /dev/null "$url"
          echo "ok: $url"
          # snstac apt repo must be serving (sensor stack installs from it mid-build)
          curl -fsSIL --max-time 30 -o /dev/null "https://snstac.github.io/packages/apt/dists/stable/Release"
          echo "ok: snstac apt repo"

  build:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360
    permissions:
      contents: write
    env:
      DISABLE_FIRST_BOOT_USER_RENAME: 1
      ENABLE_SSH: 1
      IMG_NAME: aryaos
      RELEASE: trixie
      PI_GEN_ROOT: ${{ github.workspace }}/pi-gen-src
      TARGET_HOSTNAME: aryaos
      FIRST_USER_PASS: aryaos415
      PI_GEN_RELEASE: "AryaOS: The Operating System for Modern Situational Awareness."
      LOCALE_DEFAULT: en_US.UTF-8
      WPA_COUNTRY: US
      WPA_ESSID: AryaOS-WiFi
      WPA_PASSWORD: aryaos415
      KEYBOARD_LAYOUT: English (US)
      KEYBOARD_KEYMAP: us
      # Dev builds by default (lab SSH key + passwordless sudo, no password
      # expiry) for easy burn-and-test. Release builds: Actions -> Pi-gen
      # image -> Run workflow with "release" checked.
      ARYAOS_LAB_ACCESS: ${{ github.event_name == 'workflow_dispatch' && inputs.release == true && '0' || '1' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Free disk space
        # Aggressive: build 27284908891 hit ENOSPC in stage-dronecot. Do NOT use
        # pi-gen-action's increase-runner-disk-size — its apt purge list is x86-only
        # and exits 100 on ubuntu-24.04-arm (build 27286374300).
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache \
            /usr/local/.ghcup /usr/share/swift /usr/local/share/powershell \
            /usr/local/lib/node_modules /usr/share/miniconda /opt/az /opt/microsoft \
            /usr/lib/google-cloud-sdk /usr/local/share/chromium /usr/local/julia* || true
          sudo docker system prune -af 2>/dev/null || true
          sudo apt-get clean
          df -h

      - name: Set current working directory
        run: echo "GITHUB_CWD=$(pwd)" >> "$GITHUB_ENV"

      - name: Set SHARED_FILES dir
        run: echo "SHARED_FILES=$(pwd)/shared_files" >> "$GITHUB_ENV"

      - name: Build RPi AryaOS image
        uses: usimd/pi-gen-action@v1
        id: build_aryaos
        env:
          SHARED_FILES: ${{ env.SHARED_FILES }}
          GITHUB_CWD: ${{ env.GITHUB_CWD }}
          PI_GEN_ROOT: ${{ env.PI_GEN_ROOT }}
          RELEASE: ${{ env.RELEASE }}
        with:
          # Keep false: the action's disk cleanup purges x86-only packages and
          # fails on arm64 runners. Space is freed in "Free disk space" above.
          increase-runner-disk-size: false
          export-last-stage-only: true
          compression: xz
          compression-level: 4
          pi-gen-dir: pi-gen-src
          disable-first-boot-user-rename: ${{ env.DISABLE_FIRST_BOOT_USER_RENAME }}
          enable-ssh: ${{ env.ENABLE_SSH }}
          username: pi
          image-name: ${{ env.IMG_NAME }}-${{ github.ref_name }}${{ env.ARYAOS_LAB_ACCESS == '1' && '-dev' || '' }}
          hostname: ${{ env.TARGET_HOSTNAME }}
          locale: ${{ env.LOCALE_DEFAULT }}
          password: ${{ env.FIRST_USER_PASS }}
          pi-gen-release: ${{ env.PI_GEN_RELEASE }}
          release: ${{ env.RELEASE }}
          stage-list: "${{ env.GITHUB_CWD }}/stages/stage-patch stage0 stage1 stage2 ${{ env.GITHUB_CWD }}/stages/stage-base ${{ env.GITHUB_CWD }}/stages/stage-aryaos ${{ env.GITHUB_CWD }}/stages/stage-pytak ${{ env.GITHUB_CWD }}/stages/stage-charontak ${{ env.GITHUB_CWD }}/stages/stage-lincot ${{ env.GITHUB_CWD }}/stages/stage-node-red ${{ env.GITHUB_CWD }}/stages/stage-docker ${{ env.GITHUB_CWD }}/stages/stage-adsbcot ${{ env.GITHUB_CWD }}/stages/stage-aiscot ${{ env.GITHUB_CWD }}/stages/stage-dronecot ${{ env.GITHUB_CWD }}/stages/stage-bt-pan"
          wpa-country: ${{ env.WPA_COUNTRY }}
          wpa-essid: ${{ env.WPA_ESSID }}
          wpa-password: ${{ env.WPA_PASSWORD }}
          keyboard-layout: ${{ env.KEYBOARD_LAYOUT }}
          keyboard-keymap: ${{ env.KEYBOARD_KEYMAP }}
          pi-gen-version: arm64
          verbose-output: true
          # pi-gen-action bind-mounts stage dirs only; custom scripts resolve repo paths like
          # ${GITHUB_WORKSPACE}/shared_files — bind those trees into the pi-gen Docker container too.
          # scripts/ + packaging/ are needed by stage-aryaos to build the aryaos-overlay deb
          # (without them the [[ -x ]] guard silently skipped it; verify-image now asserts it).
          docker-opts: >-
            -v ${{ github.workspace }}/shared_files:${{ github.workspace }}/shared_files:ro
            -v ${{ github.workspace }}/manifests:${{ github.workspace }}/manifests:ro
            -v ${{ github.workspace }}/scripts:${{ github.workspace }}/scripts:ro
            -v ${{ github.workspace }}/packaging:${{ github.workspace }}/packaging:ro
            -v ${{ github.workspace }}/pi-gen-src:${{ github.workspace }}/pi-gen-src
            -e GITHUB_WORKSPACE=${{ github.workspace }}
            -e ARYAOS_CI_TRIM_WORK=1
            -e ARYAOS_LAB_ACCESS=${{ env.ARYAOS_LAB_ACCESS }}

      - name: Show deploy output
        if: success()
        run: |
          echo "image-path=${{ steps.build_aryaos.outputs.image-path }}"
          ls -la pi-gen-src/deploy 2>/dev/null || ls -la "${{ github.workspace }}/pi-gen-src/deploy" || true

      - name: Upload image artifact
        if: success() && steps.build_aryaos.outputs.image-path != ''
        uses: actions/upload-artifact@v7
        with:
          name: aryaos-image-${{ github.sha }}
          path: ${{ steps.build_aryaos.outputs.image-path }}
          retention-days: 30
          if-no-files-found: error

      - name: Verify image contents
        # Loop-mounts the image and asserts key files, packages, and units exist —
        # and that no lab access (dev SSH key / NOPASSWD sudo) ships in release images.
        # Runs after artifact upload so a failure blocks the release but keeps the
        # artifact for debugging.
        if: success() && steps.build_aryaos.outputs.image-path != ''
        run: |
          set -euo pipefail
          if [ "${ARYAOS_LAB_ACCESS}" = "1" ]; then
            sudo bash ./scripts/verify-image.sh --lab "${{ steps.build_aryaos.outputs.image-path }}"
          else
            sudo bash ./scripts/verify-image.sh "${{ steps.build_aryaos.outputs.image-path }}"
          fi

      - name: Compute release tag
        id: reltag
        if: success() && steps.build_aryaos.outputs.image-path != ''
        run: |
          set -euo pipefail
          SHORT="$(git rev-parse --short=12 HEAD)"
          TS="$(date -u +%Y.%m.%d.%H%M%S)"
          OVERRIDE="${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || '' }}"
          if [ -n "${OVERRIDE}" ]; then
            if [ "${ARYAOS_LAB_ACCESS}" = "1" ]; then
              echo "release_tag override is only allowed for release builds" >&2
              exit 1
            fi
            SEMVER_RE='^v(0|[1-9][0-9]*)[.](0|[1-9][0-9]*)[.](0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*)([.](0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*))*))?([+][0-9A-Za-z-]+([.][0-9A-Za-z-]+)*)?$'
            if ! printf '%s' "${OVERRIDE}" | grep -Eq "${SEMVER_RE}"; then
              echo "Invalid release_tag: ${OVERRIDE}" >&2
              exit 1
            fi
            TAG="${OVERRIDE}"
          else
            TAG="v${TS}-${SHORT}"
          fi
          if [ "${ARYAOS_LAB_ACCESS}" = "1" ]; then
            TAG="${TAG}-dev"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Computed release tag ${TAG}"

      - name: Create and push release tag
        if: success() && steps.build_aryaos.outputs.image-path != ''
        run: |
          set -euo pipefail
          TAG="${{ steps.reltag.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Automated image build ${{ github.sha }}"
          git push origin "refs/tags/${TAG}"

      - name: Build overlay deb for release asset
        if: success() && steps.build_aryaos.outputs.image-path != ''
        run: |
          set -euo pipefail
          # Attach aryaos-overlay to the release so snstac/packages indexes it
          # and deployed units can upgrade the overlay itself via apt/Cockpit.
          bash ./scripts/build-aryaos-overlay-deb.sh
          ls -l deploy/debs/

      - name: Publish GitHub Release
        if: success() && steps.build_aryaos.outputs.image-path != ''
        run: |
          set -euo pipefail
          TAG="${{ steps.reltag.outputs.tag }}"
          BODY="${{ env.ARYAOS_LAB_ACCESS == '1' && '**DEV BUILD** — lab access baked in (aryaos-dev-lab SSH key + passwordless sudo for pi, no first-boot password expiry). For lab burn-and-test only; never deploy in the field. For a release image run this workflow with the release input checked.' || 'Release build — no lab access; default password expires at first login. Contents verified by scripts/verify-image.sh before publishing.' }}"
          args=(release create "$TAG" "${{ steps.build_aryaos.outputs.image-path }}" --title "$TAG" --generate-notes --notes "$BODY" --verify-tag)
          for deb in deploy/debs/aryaos-overlay_*_all.deb; do
            [ -f "$deb" ] && args+=("$deb")
          done
          if [ "${ARYAOS_LAB_ACCESS}" = "1" ]; then
            args+=(--prerelease)
          fi
          gh "${args[@]}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
