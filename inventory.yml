all:
  hosts:
    aryaaio:
      ansible_host: 172.17.2.70
    debauto:
      ansible_host: 192.168.0.202
    rocky-dev:
      ansible_host: 172.17.2.195
    fieldserver:
      ansible_host: 192.168.0.245
    imxtak:
      ansible_host: 192.168.0.45
    wave:
      ansible_host: 172.17.2.182
    dragonball:
      ansible_host: dragonball
      ansible_user: gba
      ansible_ssh_private_key_file: ~/.ssh/id_ed25519_nopass
    aryaos-dev-pi:
      ansible_host: 172.17.2.158
      ansible_user: pi
      ansible_ssh_private_key_file: "{{ inventory_dir }}/shared_files/aryaos/ssh/aryaos-dev-lab"

  # ARM64 dev targets for Ansible iteration without rebuilding/flashing an SD image.
  # See docs/build.md → "Developer loops".
  children:
    dev_arm64:
      hosts:
        dev_arm64_example:
          # RFC 5737 TEST-NET placeholder — replace with your QEMU/cloud/Pi arm64 host IP.
          ansible_host: 192.0.2.50
